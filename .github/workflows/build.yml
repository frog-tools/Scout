name: Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate native project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        working-directory: android
        run: mv android/app/build/outputs/apk/release/app-release.apk Scout-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Scout-${{ steps.version.outputs.tag }}.apk
          path: Scout-${{ steps.version.outputs.tag }}.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "Scout-${{ steps.version.outputs.tag }}.apk"

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build .app
        working-directory: ios
        run: xcodebuild -workspace Scout.xcworkspace -scheme Scout -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Archive .app
        run: cd ios/build/Build/Products/Release-iphoneos && zip -r "$GITHUB_WORKSPACE/Scout-${{ steps.version.outputs.tag }}.app.zip" Scout.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: Scout-${{ steps.version.outputs.tag }}.app
          path: Scout-${{ steps.version.outputs.tag }}.app.zip

      - name: Attach .app to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "Scout-${{ steps.version.outputs.tag }}.app.zip"
