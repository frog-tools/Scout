name: Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate native project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Scout.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" android/app/build/outputs/apk/release/app-release.apk#Scout.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build .app
        working-directory: ios
        run: xcodebuild -workspace Scout.xcworkspace -scheme Scout -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Archive .app
        run: cd ios/build/Build/Products/Release-iphoneos && zip -r "$GITHUB_WORKSPACE/Scout.app.zip" Scout.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: Scout.app
          path: Scout.app.zip

      - name: Attach .app to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" Scout.app.zip#Scout.app.zip
